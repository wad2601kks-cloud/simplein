<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seller dashboard - simplein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.363.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1e40af', accent: '#f97316' }, fontFamily: { sans: ['inter', 'sans-serif'] } } } }
    </script>
    <style>
        body { font-family: 'inter', sans-serif; }
        .hidden-view { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden text-left">

    <div id="login-view" class="fixed inset-0 bg-slate-900/95 z-[100] flex items-center justify-center backdrop-blur-md p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-4xl font-black text-primary mb-2 tracking-tighter italic">seller.</h2>
            <p class="text-slate-400 text-xs mb-8 font-medium uppercase tracking-widest">masuk dashboard toko lu</p>
            <form class="space-y-4" onsubmit="event.preventDefault(); window.handleLogin();">
                <input type="email" id="email-input" placeholder="email seller" required class="w-full border rounded-2xl px-5 py-4 outline-none focus:border-primary transition bg-slate-50 text-sm">
                <input type="password" id="password-input" placeholder="password" required class="w-full border rounded-2xl px-5 py-4 outline-none focus:border-primary transition bg-slate-50 text-sm">
                <button type="submit" id="btn-login-label" class="w-full bg-primary text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-200 hover:scale-[1.02] active:scale-95 transition uppercase tracking-widest text-xs">masuk sekarang</button>
            </form>
            <button onclick="location.href='index.html'" class="mt-6 text-[10px] text-slate-400 font-black uppercase tracking-widest hover:text-primary transition">kembali ke toko</button>
        </div>
    </div>

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-8 border-b">
            <div class="font-black text-3xl text-primary italic tracking-tighter">seller.</div>
            <div class="mt-8 p-5 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                <div id="active-user-email" class="font-bold text-slate-700 truncate text-[10px] mb-4 opacity-60">memuat...</div>
                <button id="btn-logout" class="w-full bg-red-50 text-red-600 font-black py-3 rounded-xl text-[10px] uppercase tracking-widest border border-red-100 transition hover:bg-red-100">keluar</button>
            </div>
        </div>
        <nav class="p-6 space-y-3 flex-grow">
            <button onclick="switchtab('dashboard')" class="w-full flex items-center gap-3 px-5 py-4 hover:bg-blue-50 rounded-2xl font-bold text-xs text-slate-600 transition group">
                <i data-lucide="layout-dashboard" class="w-4 h-4 group-hover:text-primary"></i> ringkasan
            </button>
            <button onclick="switchtab('products')" class="w-full flex items-center gap-3 px-5 py-4 hover:bg-blue-50 rounded-2xl font-bold text-xs text-slate-600 transition group">
                <i data-lucide="package-plus" class="w-4 h-4 group-hover:text-primary"></i> tambah produk
            </button>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-full overflow-y-auto p-10 bg-slate-50/50">
        
        <div id="dashboard-view" class="space-y-8 animate-in fade-in duration-500">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">ringkasan hari ini.</h2>
                    <p class="text-slate-400 text-sm">pantau penjualan lu secara realtime bos.</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-8 mb-10">
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <div class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-2">total pendapatan</div>
                    <div class="text-4xl font-black text-slate-900 tracking-tighter" id="daily-revenue">Rp 0</div>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <div class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-2">pesanan masuk</div>
                    <div class="text-4xl font-black text-primary tracking-tighter" id="daily-orders">0</div>
                </div>
            </div>

            <h3 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> antrean pesanan
            </h3>
            <div id="live-orders-container" class="grid grid-cols-1 gap-6"></div>
        </div>

        <div id="products-view" class="hidden-view space-y-8 animate-in fade-in duration-500 text-left">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">tambah produk.</h2>
            <form id="form-tambah-produk" class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-xl max-w-2xl space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">nama barang</label>
                    <input type="text" id="p-name" placeholder="misal: Razer BlackShark V2" required class="w-full border rounded-2xl px-5 py-3.5 outline-none focus:border-primary transition bg-slate-50 text-sm">
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">harga jual (Rp)</label>
                        <input type="number" id="p-price" placeholder="1800000" required class="w-full border rounded-2xl px-5 py-3.5 outline-none focus:border-primary transition bg-slate-50 text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">nama toko lu</label>
                        <input type="text" id="p-storename" placeholder="Comp Berkah" required class="w-full border rounded-2xl px-5 py-3.5 outline-none focus:border-primary transition bg-slate-50 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">berat barang</label>
                        <input type="text" id="p-berat" placeholder="ex: 250g" class="w-full border rounded-2xl px-5 py-3.5 outline-none focus:border-primary transition bg-slate-50 text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">dimensi / volume</label>
                        <input type="text" id="p-volume" placeholder="ex: 10x20x5cm" class="w-full border rounded-2xl px-5 py-3.5 outline-none focus:border-primary transition bg-slate-50 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 p-6 bg-blue-50 rounded-[2rem] border border-blue-100">
                    <div class="space-y-2 text-center">
                        <label class="block text-[9px] font-black text-blue-600 uppercase mb-2">1. media produk</label>
                        <input type="file" id="p-media" accept="image/*,video/*" required class="text-[9px] w-full">
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="block text-[9px] font-black text-orange-600 uppercase mb-2">2. qr pembayaran</label>
                        <input type="file" id="p-qr" accept="image/*" required class="text-[9px] w-full">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">metode (Bank/E-wallet)</label>
                        <input type="text" id="p-bank" placeholder="BCA / DANA / QRIS" required class="w-full border rounded-2xl px-5 py-3.5 outline-none focus:border-primary transition bg-slate-50 text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">no rekening / hp</label>
                        <input type="text" id="p-rekening" placeholder="0812345678" required class="w-full border rounded-2xl px-5 py-3.5 outline-none focus:border-primary transition bg-slate-50 text-sm">
                    </div>
                </div>

                <button type="submit" id="btn-simpan-produk" class="w-full bg-[#111827] text-white py-5 rounded-[2rem] font-black shadow-xl hover:bg-black transition uppercase tracking-widest text-xs">simpan produk sekarang</button>
            </form>
        </div>
    </main>

    <div id="chat-modal-seller" class="hidden fixed bottom-6 right-6 z-[100] w-80 h-[500px] bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden text-left animate-in slide-in-from-bottom-5">
        <div class="p-5 bg-primary text-white flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                <span class="font-black italic text-sm tracking-tight" id="chat-target-name">chat.</span>
            </div>
            <button onclick="document.getElementById('chat-modal-seller').classList.add('hidden')" class="font-bold">✕</button>
        </div>
        <div id="chat-box-seller" class="flex-grow p-5 overflow-y-auto space-y-4 bg-slate-50/50 flex flex-col"></div>
        <form onsubmit="event.preventDefault(); window.sendChatSeller();" class="p-4 bg-white border-t flex items-center gap-2">
            <label class="cursor-pointer text-slate-300 hover:text-primary transition"><i data-lucide="paperclip" class="w-5 h-5"></i><input type="file" id="chat-media-seller" accept="image/*,video/*" class="hidden"></label>
            <input type="text" id="chat-input-seller" placeholder="balas bos..." class="flex-grow border-none bg-slate-100 rounded-2xl px-5 py-3 text-xs outline-none focus:ring-2 focus:ring-blue-100">
            <button type="submit" class="bg-primary text-white p-3 rounded-2xl shadow-lg"><i data-lucide="send" class="w-4 h-4"></i></button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdPxvp6zhIEjNPdQJq-4F7eU0bwTaGrMs",
            authDomain: "simplein-55eeb.firebaseapp.com",
            projectId: "simplein-55eeb",
            storageBucket: "simplein-55eeb.firebasestorage.app",
            messagingSenderId: "513993838187",
            appId: "1:513993838187:web:281d8a37bc75fab7572b2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentChatOrderId = null;
        let unsubscribeChatSeller = null;

        window.switchtab = (tabName) => {
            document.getElementById('dashboard-view').classList.add('hidden-view');
            document.getElementById('products-view').classList.add('hidden-view');
            document.getElementById(tabName + '-view').classList.remove('hidden-view');
        };

        window.lihatBukti = (base64) => {
            const win = window.open();
            win.document.write(`<body style="margin:0;display:flex;justify-content:center;background:#000"><img src="${base64}" style="max-height:100vh"></body>`);
        };

        window.accPembayaran = async (id) => {
            if(confirm("Konfirmasi pembayaran ini? Status pesanan bakal berubah di buyer.")) {
                try { await updateDoc(doc(db, "transactions", id), { status: "diproses" }); alert("Pembayaran Berhasil Dikonfirmasi!"); } catch (e) { alert("Gagal!"); }
            }
        };

        // AUTH HANDLER
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-view').classList.add('hidden-view');
                document.getElementById('active-user-email').innerText = user.email;
                mulaiPantauPesanan(user.email);
            } else {
                document.getElementById('login-view').classList.remove('hidden-view');
            }
        });

        window.handleLogin = () => {
            const e = document.getElementById('email-input').value;
            const p = document.getElementById('password-input').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Email/Password salah bos!"));
        };

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        function mulaiPantauPesanan(email) {
            const q = query(collection(db, "transactions"), where("sellerid", "==", email), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('live-orders-container');
                container.innerHTML = ''; let rev = 0; let count = 0;
                snap.forEach((d) => {
                    const data = d.data(); const id = d.id;
                    if(data.status === 'diproses') rev += data.price;
                    count++;
                    container.innerHTML += `
                    <div class="p-8 bg-white border border-slate-100 rounded-[2.5rem] shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="text-left flex-grow">
                            <h5 class="font-black text-xl text-slate-800 tracking-tight">${data.item}</h5>
                            <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest mt-1">PEMBELI: ${data.customer}</p>
                            <div class="mt-4 p-3 bg-blue-50 rounded-xl text-[10px] text-blue-600 font-bold border border-blue-100">🏠 ${data.address || 'Tanpa Alamat'}</div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-3 min-w-[200px]">
                            <p class="text-2xl font-black text-primary tracking-tighter">Rp ${data.price.toLocaleString()}</p>
                            <span class="text-[9px] px-4 py-1.5 rounded-full font-black uppercase tracking-widest ${data.status === 'menunggu konfirmasi' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}">${data.status}</span>
                            <div class="flex gap-2 mt-2 w-full">
                                <button onclick="window.lihatBukti('${data.bukti_transfer}')" class="bg-slate-100 text-slate-500 p-3 rounded-xl hover:bg-slate-200 transition flex-grow font-black text-[9px] uppercase">Bukti TF</button>
                                <button onclick="window.openChatSeller('${id}', '${data.customer}')" class="p-3 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition"><i data-lucide="message-circle" class="w-4 h-4"></i></button>
                                ${data.status === 'menunggu konfirmasi' ? `<button onclick="window.accPembayaran('${id}')" class="p-3 bg-green-500 text-white rounded-xl shadow-lg shadow-green-100 hover:bg-green-600 transition flex-grow font-black text-[9px] uppercase tracking-widest">ACC</button>` : ''}
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('daily-revenue').innerText = "Rp " + rev.toLocaleString();
                document.getElementById('daily-orders').innerText = count;
                lucide.createIcons();
            });
        }

        // CHAT LOGIC
        window.openChatSeller = (orderId, customerName) => {
            currentChatOrderId = orderId;
            document.getElementById('chat-target-name').innerText = customerName;
            document.getElementById('chat-modal-seller').classList.remove('hidden');
            if(unsubscribeChatSeller) unsubscribeChatSeller();
            const q = query(collection(db, "chats"), where("orderid", "==", orderId), orderBy("time", "asc"));
            unsubscribeChatSeller = onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chat-box-seller');
                box.innerHTML = '';
                snapshot.forEach(doc => {
                    const c = doc.data(); const isMe = c.sender === 'seller';
                    box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}"><div class="${isMe ? 'bg-primary text-white rounded-2xl rounded-tr-none' : 'bg-white border text-slate-700 rounded-2xl rounded-tl-none'} p-3 text-[11px] shadow-sm max-w-[85%] leading-relaxed">${c.message || ''}</div></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.sendChatSeller = async () => {
            const input = document.getElementById('chat-input-seller');
            if(!input.value) return;
            await addDoc(collection(db, "chats"), { orderid: currentChatOrderId, sender: 'seller', message: input.value, time: serverTimestamp() });
            input.value = '';
        };

        // TAMBAH PRODUK
        document.getElementById('form-tambah-produk').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-simpan-produk');
            const mediaInput = document.getElementById('p-media');
            const qrInput = document.getElementById('p-qr');
            btn.disabled = true; btn.innerText = "mengunggah data...";

            const readFile = (file) => new Promise((res) => {
                const r = new FileReader(); r.readAsDataURL(file); r.onload = (ev) => res(ev.target.result);
            });

            try {
                const mBase64 = await readFile(mediaInput.files[0]);
                const qBase64 = await readFile(qrInput.files[0]);
                await addDoc(collection(db, "product"), {
                    name: document.getElementById('p-name').value,
                    price: Number(document.getElementById('p-price').value),
                    storename: document.getElementById('p-storename').value,
                    berat: document.getElementById('p-berat').value || '-',
                    volume: document.getElementById('p-volume').value || '-',
                    bank: document.getElementById('p-bank').value,
                    rekening: document.getElementById('p-rekening').value,
                    media_url: mBase64,
                    qr_url: qBase64,
                    sellerid: auth.currentUser.email,
                    time: serverTimestamp()
                });
                alert("Produk Berhasil Ditambah!");
                e.target.reset(); switchtab('dashboard');
            } catch (err) { alert("Gagal tambah produk!"); }
            btn.disabled = false; btn.innerText = "simpan produk sekarang";
        });

        lucide.createIcons();
    </script>
</body>
</html>
