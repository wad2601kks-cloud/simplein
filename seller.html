<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seller dashboard - simplein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.363.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1e40af', accent: '#f97316' }, fontFamily: { sans: ['inter', 'sans-serif'] } } } }
    </script>
    <style>body { font-family: 'inter', sans-serif; } .hidden-view { display: none !important; }</style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden text-left">

    <div id="login-view" class="fixed inset-0 bg-slate-900/90 z-[100] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
            <h2 class="text-3xl font-bold text-primary mb-2 text-center">seller.</h2>
            <form id="login-form" class="space-y-4" onsubmit="event.preventDefault();">
                <input type="email" id="email-input" placeholder="email" required class="w-full border rounded-lg px-4 py-2.5 outline-none">
                <input type="password" id="password-input" placeholder="password" required class="w-full border rounded-lg px-4 py-2.5 outline-none">
                <button type="button" id="btn-login" class="w-full bg-primary text-white py-3 rounded-xl font-bold">masuk</button>
            </form>
        </div>
    </div>

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6 border-b">
            <div class="font-bold text-2xl text-primary">seller.</div>
            <div class="mt-6 p-4 bg-slate-50 rounded-xl text-xs">
                <div id="active-user-email" class="font-bold text-slate-700 truncate mb-3 italic italic">memuat...</div>
                <button id="btn-logout" class="w-full bg-red-50 text-red-600 font-semibold py-2 rounded-lg">keluar</button>
            </div>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="switchtab('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-blue-50 rounded-xl font-medium"><i data-lucide="layout-dashboard"></i> ringkasan</button>
            <button onclick="switchtab('products')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-blue-50 rounded-xl font-medium"><i data-lucide="package"></i> tambah produk</button>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-full overflow-y-auto p-8">
        <div id="dashboard-view" class="space-y-6">
            <div class="grid grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl border"><div class="text-slate-500 text-[10px] uppercase font-bold">pendapatan</div><div class="text-3xl font-black" id="daily-revenue">Rp 0</div></div>
                <div class="bg-white p-6 rounded-2xl border"><div class="text-slate-500 text-[10px] uppercase font-bold">pesanan</div><div class="text-3xl font-black text-primary" id="daily-orders">0</div></div>
            </div>
            <h3 class="text-lg font-bold mb-4">antrean pesanan realtime</h3>
            <div id="live-orders-container" class="space-y-4 text-left"></div>
        </div>

        <div id="products-view" class="hidden-view space-y-6 text-left">
            <h2 class="text-2xl font-bold">tambah produk baru</h2>
            <form id="form-tambah-produk" class="bg-white p-8 rounded-3xl border shadow-sm max-w-2xl space-y-5">
                <input type="text" id="p-name" placeholder="nama produk" required class="w-full border rounded-xl px-4 py-2 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="p-price" placeholder="harga (Rp)" required class="border rounded-xl px-4 py-2">
                    <input type="text" id="p-storename" placeholder="nama toko" required class="border rounded-xl px-4 py-2">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="p-berat" placeholder="berat (ex: 250g)" class="border rounded-xl px-4 py-2">
                    <input type="text" id="p-volume" placeholder="dimensi (ex: 10x10cm)" class="border rounded-xl px-4 py-2">
                </div>
                <div class="p-4 bg-blue-50 rounded-2xl space-y-2">
                    <label class="block text-[10px] font-black text-blue-600 uppercase">1. Foto/Video Produk</label>
                    <input type="file" id="p-media" accept="image/*,video/*" required class="w-full text-xs">
                </div>
                <div class="p-4 bg-orange-50 rounded-2xl space-y-2 border border-orange-100">
                    <label class="block text-[10px] font-black text-orange-600 uppercase">2. Upload Foto QR Pembayaran (Asli)</label>
                    <input type="file" id="p-qr" accept="image/*" required class="w-full text-xs">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="p-bank" placeholder="BCA / DANA / QRIS" required class="border rounded-xl px-4 py-2">
                    <input type="text" id="p-rekening" placeholder="no rekening" required class="border rounded-xl px-4 py-2">
                </div>
                <button type="submit" id="btn-simpan-produk" class="w-full bg-primary text-white py-3 rounded-2xl font-bold">simpan produk</button>
            </form>
        </div>
    </main>

    <div id="chat-modal-seller" class="hidden fixed bottom-6 right-6 z-[100] w-80 h-[450px] bg-white rounded-3xl shadow-2xl border flex flex-col overflow-hidden text-left">
        <div class="p-4 bg-primary text-white flex justify-between items-center"><span class="font-bold text-sm" id="chat-target-name">chat</span><button onclick="document.getElementById('chat-modal-seller').classList.add('hidden')" class="font-bold text-lg">✕</button></div>
        <div id="chat-box-seller" class="flex-grow p-4 overflow-y-auto space-y-3 bg-slate-50 flex flex-col"></div>
        <form onsubmit="event.preventDefault(); window.sendChatSeller();" class="p-3 bg-white border-t flex items-center gap-2">
            <label class="cursor-pointer text-slate-400 hover:text-primary"><i data-lucide="image" class="w-5 h-5"></i><input type="file" id="chat-media-seller" accept="image/*,video/*" class="hidden"></label>
            <input type="text" id="chat-input-seller" placeholder="balas..." class="flex-grow border rounded-xl px-4 py-2 text-sm outline-none bg-slate-50">
            <button type="submit" class="bg-primary text-white p-2 rounded-xl"><i data-lucide="send" class="w-4 h-4"></i></button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdPxvp6zhIEjNPdQJq-4F7eU0bwTaGrMs",
            authDomain: "simplein-55eeb.firebaseapp.com",
            projectId: "simplein-55eeb",
            storageBucket: "simplein-55eeb.firebasestorage.app",
            messagingSenderId: "513993838187",
            appId: "1:513993838187:web:281d8a37bc75fab7572b2e",
            measurementId: "G-FWX89Z1PRG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentChatOrderId = null;
        let unsubscribeChatSeller = null;

        window.switchtab = (tabName) => {
            document.getElementById('dashboard-view').classList.add('hidden-view');
            document.getElementById('products-view').classList.add('hidden-view');
            document.getElementById(tabName + '-view').classList.remove('hidden-view');
        };

        window.lihatBukti = (base64) => {
            const win = window.open();
            win.document.write(`<img src="${base64}" style="max-width:100%" alt="Bukti Transfer">`);
        };

        window.accPembayaran = async (id) => {
            if(confirm("Konfirmasi pembayaran ini?")) {
                try { await updateDoc(doc(db, "transactions", id), { status: "diproses" }); alert("Pembayaran di-acc!"); } catch (e) { alert("Gagal acc!"); }
            }
        };

        window.openChatSeller = (orderId, customerName) => {
            currentChatOrderId = orderId;
            document.getElementById('chat-target-name').innerText = "chat: " + customerName;
            document.getElementById('chat-modal-seller').classList.remove('hidden');
            if(unsubscribeChatSeller) unsubscribeChatSeller();
            const q = query(collection(db, "chats"), where("orderid", "==", orderId), orderBy("time", "asc"));
            unsubscribeChatSeller = onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box-seller');
                chatBox.innerHTML = '';
                snapshot.forEach(doc => {
                    const c = doc.data();
                    const isMe = c.sender === 'seller';
                    let media = c.media_url ? (c.media_type === 'video' ? `<video src="${c.media_url}" controls class="max-w-full rounded-lg mb-1"></video>` : `<img src="${c.media_url}" class="max-w-full rounded-lg mb-1 shadow-sm" onclick="window.open('${c.media_url}')">`) : '';
                    chatBox.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-1"><div class="${isMe ? 'bg-primary text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white border text-slate-700 rounded-r-2xl rounded-tl-2xl'} p-2.5 text-[11px] shadow-sm max-w-[80%] break-words">${media}${c.message || ''}</div></div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        window.sendChatSeller = async () => {
            const input = document.getElementById('chat-input-seller');
            const fileInput = document.getElementById('chat-media-seller');
            if(!input.value && (!fileInput || fileInput.files.length === 0)) return;
            const save = async (mediaData = null, type = null) => {
                await addDoc(collection(db, "chats"), { orderid: currentChatOrderId, sender: 'seller', message: input.value, media_url: mediaData, media_type: type, time: serverTimestamp() });
                input.value = ''; if(fileInput) fileInput.value = '';
            };
            if (fileInput && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (e) => save(e.target.result, file.type.startsWith('video') ? 'video' : 'image');
            } else { save(); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-view').classList.add('hidden-view');
                document.getElementById('active-user-email').innerText = user.email;
                mulaiPantauPesanan(user.email);
            } else { document.getElementById('login-view').classList.remove('hidden-view'); }
        });

        function mulaiPantauPesanan(email) {
            const q = query(collection(db, "transactions"), where("sellerid", "==", email));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('live-orders-container');
                container.innerHTML = ''; let rev = 0; let count = 0;
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const id = docSnap.id;
                    rev += data.price; count++;
                    container.innerHTML += `<div class="p-6 bg-white border rounded-3xl shadow-sm mb-4"><div class="flex justify-between items-start"><div><h5 class="font-bold text-slate-800">${data.item}</h5><p class="text-[11px] text-slate-500">pembeli: <b>${data.customer}</b></p><p class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded mt-1 inline-block">patokan: ${data.address_detail || '-'}</p></div><div class="text-right"><p class="text-lg font-black text-primary">Rp ${data.price.toLocaleString()}</p><span class="text-[9px] px-2 py-0.5 rounded-full font-bold ${data.status === 'menunggu konfirmasi' ? 'bg-yellow-100 text-yellow-600' : 'bg-green-100 text-green-600'}">${data.status.toUpperCase()}</span></div></div><div class="flex gap-2 mt-4 pt-4 border-t"><button onclick="window.lihatBukti('${data.bukti_transfer}')" class="flex-grow bg-slate-100 text-slate-600 py-2.5 rounded-xl text-[10px] font-bold">BUKTI TF</button><button onclick="window.openChatSeller('${id}', '${data.customer}')" class="p-2.5 bg-blue-50 text-blue-600 rounded-xl"><i data-lucide="message-square" class="w-4 h-4"></i></button>${data.status === 'menunggu konfirmasi' ? `<button onclick="window.accPembayaran('${id}')" class="flex-grow bg-green-500 text-white py-2.5 rounded-xl text-[10px] font-bold shadow-lg shadow-green-100">ACC BAYAR</button>` : ''}<a href="https://www.google.com/maps?q=${data.lat},${data.lng}" target="_blank" class="bg-blue-600 text-white p-2.5 rounded-xl flex items-center"><i data-lucide="map-pin" class="w-4 h-4"></i></a></div></div>`;
                });
                document.getElementById('daily-revenue').innerText = "Rp " + rev.toLocaleString();
                document.getElementById('daily-orders').innerText = count;
                lucide.createIcons();
            });
        }

        document.getElementById('form-tambah-produk').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-simpan-produk');
            const mediaInput = document.getElementById('p-media');
            const qrInput = document.getElementById('p-qr');
            btn.disabled = true; btn.innerText = "mengunggah...";

            const readFile = (file) => new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (ev) => resolve(ev.target.result);
            });

            try {
                const mediaBase64 = await readFile(mediaInput.files[0]);
                const qrBase64 = await readFile(qrInput.files[0]);

                await addDoc(collection(db, "product"), {
                    name: document.getElementById('p-name').value,
                    price: Number(document.getElementById('p-price').value),
                    storename: document.getElementById('p-storename').value,
                    berat: document.getElementById('p-berat').value || '-',
                    volume: document.getElementById('p-volume').value || '-',
                    bank: document.getElementById('p-bank').value,
                    rekening: document.getElementById('p-rekening').value,
                    media_url: mediaBase64,
                    media_type: mediaInput.files[0].type.startsWith('video') ? 'video' : 'image',
                    qr_url: qrBase64, // INI QR ASLI SELLER
                    sellerid: auth.currentUser.email,
                    time: serverTimestamp()
                });

                alert("produk berhasil ditambah!");
                e.target.reset(); switchtab('dashboard');
            } catch (err) { alert("gagal!"); }
            finally { btn.disabled = false; btn.innerText = "simpan produk"; }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value).catch(err => alert("gagal login!"));
        });
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
