<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seller dashboard - simplein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.363.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#1e40af', accent: '#f97316' }, fontFamily: { sans: ['inter', 'sans-serif'] } } } }</script>
    <style>
        body { font-family: 'inter', sans-serif; } 
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden text-left relative">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-10">
        <div class="p-6 border-b">
            <div class="font-bold text-2xl text-primary">seller.</div>
            <div class="mt-6 p-4 bg-slate-50 rounded-xl text-xs">
                <div id="active-user-email" class="font-bold text-slate-700 truncate mb-3 italic">memuat...</div>
                <button id="btn-logout" class="w-full bg-red-50 text-red-600 font-semibold py-2 rounded-lg hover:bg-red-100 transition">keluar</button>
            </div>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="window.switchtab('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-blue-50 rounded-xl font-medium transition"><i data-lucide="layout-dashboard"></i> ringkasan</button>
            <button onclick="window.switchtab('products')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-blue-50 rounded-xl font-medium transition"><i data-lucide="package"></i> tambah produk</button>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-full overflow-y-auto p-8 z-10">
        <div id="dashboard-view" class="space-y-6">
            <div class="grid grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><div class="text-slate-500 text-[10px] uppercase font-bold">pendapatan</div><div class="text-3xl font-black" id="daily-revenue">rp 0</div></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><div class="text-slate-500 text-[10px] uppercase font-bold">pesanan</div><div class="text-3xl font-black text-primary" id="daily-orders">0</div></div>
            </div>
            <h3 class="text-lg font-bold mb-4">antrean pesanan realtime</h3>
            <div id="live-orders-container" class="space-y-4 text-left"></div>
        </div>

        <div id="products-view" class="hidden-view space-y-6 text-left">
            <h2 class="text-2xl font-bold">tambah produk baru</h2>
            <form id="form-tambah-produk" class="bg-white p-8 rounded-3xl border shadow-sm max-w-2xl space-y-5">
                <input type="text" id="p-name" placeholder="nama produk" required class="w-full border rounded-xl px-4 py-2 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="p-price" placeholder="harga (rp)" required class="border rounded-xl px-4 py-2">
                    <input type="text" id="p-storename" placeholder="nama toko" required class="border rounded-xl px-4 py-2">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="p-berat" placeholder="berat (ex: 250g)" class="border rounded-xl px-4 py-2">
                    <input type="text" id="p-volume" placeholder="dimensi (ex: 10x10cm)" class="border rounded-xl px-4 py-2">
                </div>
                <div class="p-4 bg-blue-50 rounded-2xl space-y-2">
                    <label class="block text-[10px] font-black text-blue-600 uppercase">1. foto produk</label>
                    <input type="file" id="p-media" accept="image/*" required class="w-full text-xs cursor-pointer">
                </div>
                <div class="p-4 bg-orange-50 rounded-2xl space-y-2 border border-orange-100">
                    <label class="block text-[10px] font-black text-orange-600 uppercase">2. upload foto qr pembayaran asli</label>
                    <input type="file" id="p-qr" accept="image/*" required class="w-full text-xs cursor-pointer">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="p-bank" placeholder="bca / dana / qris" required class="border rounded-xl px-4 py-2">
                    <input type="text" id="p-rekening" placeholder="no rekening" required class="border rounded-xl px-4 py-2">
                </div>
                <button type="submit" id="btn-simpan-produk" class="w-full bg-primary text-white py-3 rounded-2xl font-bold hover:bg-blue-800 transition">simpan produk</button>
            </form>
        </div>
    </main>

    <div id="chat-modal-seller" class="hidden-view fixed bottom-6 right-6 z-[100] w-80 h-[450px] bg-white rounded-3xl shadow-2xl border flex flex-col overflow-hidden text-left">
        <div class="p-4 bg-primary text-white flex justify-between items-center"><span class="font-bold text-sm" id="chat-target-name">chat</span><button onclick="document.getElementById('chat-modal-seller').classList.add('hidden-view')" class="font-bold text-lg hover:text-red-300 transition">✕</button></div>
        <div id="chat-box-seller" class="flex-grow p-4 overflow-y-auto space-y-3 bg-slate-50 flex flex-col text-[11px]"></div>
        <form onsubmit="event.preventDefault(); window.sendChatSeller();" class="p-3 bg-white border-t flex items-center gap-2">
            <label class="cursor-pointer text-slate-400 hover:text-primary transition">
                <i data-lucide="image" class="w-5 h-5"></i>
                <input type="file" id="chat-media-seller" accept="image/*" class="hidden">
            </label>
            <input type="text" id="chat-input-seller" placeholder="balas bos..." class="flex-grow border rounded-xl px-4 py-2 text-xs outline-none bg-slate-50 focus:border-primary">
            <button type="submit" class="bg-primary text-white p-2 rounded-xl hover:bg-blue-800 transition"><i data-lucide="send" class="w-4 h-4"></i></button>
        </form>
    </div>

    <div id="login-view" class="fixed inset-0 bg-[#0f172a] bg-opacity-95 z-[999999] flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative pointer-events-auto">
            <h2 id="auth-title" class="text-3xl font-bold text-primary mb-4 tracking-tight">login seller.</h2>
            <form id="login-form" class="space-y-4" onsubmit="event.preventDefault(); window.handleAuth();">
                <input type="email" id="email-input" placeholder="email toko" required class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 outline-none text-sm focus:border-primary">
                <input type="password" id="password-input" placeholder="password (min 6 karakter)" required class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 outline-none text-sm focus:border-primary">
                <button type="submit" id="btn-auth" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold hover:bg-blue-800 tracking-widest text-xs uppercase cursor-pointer">masuk</button>
            </form>
            <div class="mt-6 flex flex-col gap-3 text-center">
                <button type="button" onclick="window.toggleAuthMode()" id="toggle-auth-btn" class="text-xs text-primary font-bold hover:underline cursor-pointer">belum punya toko? daftar di sini</button>
                <a href="index.html" class="text-[10px] text-slate-400 font-bold uppercase hover:text-primary mt-2 cursor-pointer">kembali ke web utama</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        // MASUKIN API KEY LU DI SINI BOS
       const firebaseConfig = {
            apiKey: "AIzaSyAdPxvp6zhIEjNPdQJq-4F7eU0bwTaGrMs",
            authDomain: "simplein-55eeb.firebaseapp.com",
            projectId: "simplein-55eeb",
            storageBucket: "simplein-55eeb.firebasestorage.app",
            messagingSenderId: "513993838187",
            appId: "1:513993838187:web:281d8a37bc75fab7572b2e",
            measurementId: "G-FWX89Z1PRG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Biar loginnya gak nempel selamanya kalo tab diclose
        setPersistence(auth, browserSessionPersistence);

        let currentChatOrderId = null;
        let unsubscribeChatSeller = null;
        let isLoginMode = true;

        const formatrupiah = (angka) => new Intl.NumberFormat('id-id', { style: 'currency', currency: 'idr', maximumFractionDigits: 0 }).format(angka);

        window.switchtab = (tabName) => {
            document.getElementById('dashboard-view').classList.add('hidden-view');
            document.getElementById('products-view').classList.add('hidden-view');
            document.getElementById(tabName + '-view').classList.remove('hidden-view');
        };

        window.lihatBukti = (base64) => {
            const win = window.open();
            win.document.write(`<body style="margin:0;display:flex;justify-content:center;background:#1e293b"><img src="${base64}" style="max-height:100vh"><\/body>`);
        };

        window.accPembayaran = async (id) => {
            if(confirm("konfirmasi pembayaran ini bos?")) {
                try { await updateDoc(doc(db, "transactions", id), { status: "diproses" }); alert("pembayaran di-acc!"); } catch (e) { alert("gagal acc!"); }
            }
        };
window.openChatSeller = (orderId, customerName) => {
            currentChatOrderId = orderId;
            document.getElementById('chat-target-name').innerText = "chat: " + customerName;
            document.getElementById('chat-modal-seller').classList.remove('hidden-view');
            if(unsubscribeChatSeller) unsubscribeChatSeller();
            
            const q = query(collection(db, "chats"), where("orderid", "==", orderId));
            unsubscribeChatSeller = onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box-seller'); chatBox.innerHTML = '';
                const msgs = []; snapshot.forEach(doc => msgs.push(doc.data()));
                msgs.sort((a,b) => (a.time?.seconds || 0) - (b.time?.seconds || 0));

                msgs.forEach(c => {
                    const isMe = c.sender === 'seller';
                    // buat nampilin gambar kalo ada
                    const media = c.media_url ? `<img src="${c.media_url}" class="max-w-full rounded-lg mb-1 shadow-sm cursor-pointer" onclick="window.open('${c.media_url}')">` : '';
                    
                    chatBox.innerHTML += `
                        <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-1">
                            <div class="${isMe ? 'bg-primary text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white border text-slate-700 rounded-r-2xl rounded-tl-2xl'} p-2 text-[10px] shadow-sm max-w-[80%] break-words">
                                ${media}${c.message || ''}</div>
                        </div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        window.sendChatSeller = async () => {
            const input = document.getElementById('chat-input-seller'); 
            const fileInput = document.getElementById('chat-media-seller');
            
            // validasi: teks kosong DAN file kosong = gak usah kirim
            if(!input.value && (!fileInput || fileInput.files.length === 0)) return;

            const saveMsg = async (mediaBase64 = null) => {
                await addDoc(collection(db, "chats"), { 
                    orderid: currentChatOrderId, 
                    sender: 'seller', 
                    message: input.value, 
                    media_url: mediaBase64, // nyimpen gambar base64
                    time: serverTimestamp() 
                });
                // reset input
                input.value = ''; 
                if(fileInput) fileInput.value = '';
            };

            // kalo ada file gambar
            if (fileInput && fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.readAsDataURL(fileInput.files[0]);
                reader.onload = (e) => saveMsg(e.target.result); // kirim base64
            } else { 
                saveMsg(); // kirim teks doang
            }
        };

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "login seller." : "buka toko baru.";
            document.getElementById('btn-auth').innerText = isLoginMode ? "masuk" : "daftar sekarang";
            document.getElementById('toggle-auth-btn').innerText = isLoginMode ? "belum punya toko? daftar di sini" : "udah punya toko? masuk bos";
        };

        window.handleAuth = async () => {
            const e = document.getElementById('email-input').value;
            const p = document.getElementById('password-input').value;
            const btn = document.getElementById('btn-auth');
            
            btn.disabled = true; btn.innerText = "tunggu...";
            
            try {
                if(isLoginMode) {
                    await signInWithEmailAndPassword(auth, e, p);
                } else {
                    await createUserWithEmailAndPassword(auth, e, p);
                    alert("toko berhasil dibuat bos!");
                }
            } catch(err) {
                alert("gagal bos: " + err.message);
                btn.disabled = false; btn.innerText = isLoginMode ? "masuk" : "daftar sekarang";
            }
        };

        document.getElementById('btn-logout').addEventListener('click', async () => {
            await signOut(auth);
            location.reload();
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-view').classList.add('hidden-view');
                document.getElementById('active-user-email').innerText = user.email;
                mulaiPantauPesanan(user.email);
            } else { document.getElementById('login-view').classList.remove('hidden-view'); }
        });

        function mulaiPantauPesanan(email) {
            const q = query(collection(db, "transactions"), where("sellerid", "==", email));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('live-orders-container'); container.innerHTML = ''; let rev = 0; let count = 0;
                const docs = []; snapshot.forEach(d => docs.push({id: d.id, ...d.data()}));
                docs.sort((a, b) => (b.time?.seconds || 0) - (a.time?.seconds || 0));

                if (docs.length === 0) container.innerHTML = '<div class="text-sm text-slate-400 italic">belum ada pesanan bos...</div>';

                docs.forEach((data) => {
                    if(data.status === 'diproses') rev += Number(data.price); count++;
                    const mapLink = (data.lat && data.lng) ? `<a href="https://www.google.com/maps/search/?api=1&query=$$${data.lat},${data.lng}" target="_blank" class="bg-blue-600 hover:bg-blue-700 transition text-white p-2.5 rounded-xl flex items-center"><i data-lucide="map-pin" class="w-4 h-4"></i></a>` : '';
                    
                    container.innerHTML += `
                    <div class="p-6 bg-white border rounded-3xl shadow-sm mb-4">
                        <div class="flex justify-between items-start">
                            <div class="flex gap-4 items-center">
                                <div class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center">
                                    <i data-lucide="package" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h5 class="font-bold text-slate-800">${data.item}</h5>
                                    <p class="text-[11px] text-slate-500">pembeli: <b>${data.customer}</b></p>
                                    <p class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded mt-1 inline-block">patokan: ${data.address_detail || '-'}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-primary">${formatrupiah(data.price)}</p>
                                <span class="text-[9px] px-2 py-0.5 rounded-full font-bold ${data.status === 'menunggu konfirmasi' ? 'bg-yellow-100 text-yellow-600' : 'bg-green-100 text-green-600'}">${data.status.toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-4 pt-4 border-t">
                            <button onclick="window.lihatBukti('${data.bukti_transfer}')" class="flex-grow bg-slate-100 text-slate-600 py-2.5 rounded-xl text-[10px] font-bold hover:bg-slate-200 transition">bukti tf</button>
                            <button onclick="window.openChatSeller('${data.id}', '${data.customer}')" class="p-2.5 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition"><i data-lucide="message-square" class="w-4 h-4"></i></button>
                            ${data.status === 'menunggu konfirmasi' ? `<button onclick="window.accPembayaran('${data.id}')" class="flex-grow bg-green-500 text-white py-2.5 rounded-xl text-[10px] font-bold shadow-lg shadow-green-100 hover:bg-green-600 transition">acc bayar</button>` : ''}
                            ${mapLink}
                        </div>
                    </div>`;
                });
                document.getElementById('daily-revenue').innerText = formatrupiah(rev);
                document.getElementById('daily-orders').innerText = count;
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });
        }

        document.getElementById('form-tambah-produk').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-simpan-produk');
            
            const toBase64 = (file) => new Promise((res) => {
                const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file);
            });

            btn.disabled = true; btn.innerText = "mengunggah...";

            try {
                const mediaBase64 = await toBase64(document.getElementById('p-media').files[0]);
                const qrBase64 = await toBase64(document.getElementById('p-qr').files[0]);

                await addDoc(collection(db, "product"), {
                    name: document.getElementById('p-name').value, price: Number(document.getElementById('p-price').value),
                    storename: document.getElementById('p-storename').value, berat: document.getElementById('p-berat').value || '-',
                    volume: document.getElementById('p-volume').value || '-', bank: document.getElementById('p-bank').value,
                    rekening: document.getElementById('p-rekening').value, media_url: mediaBase64, qr_url: qrBase64, 
                    sellerid: auth.currentUser.email, time: serverTimestamp()
                });

                alert("produk berhasil ditambah bos!"); e.target.reset(); window.switchtab('dashboard');
            } catch (err) { alert("gagal nambah produk bos!"); }
            finally { btn.disabled = false; btn.innerText = "simpan produk"; }
        });
        
        window.addEventListener('load', () => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
    </script>
</body>
</html>
