<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seller dashboard - simplein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.363.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#1e40af' } } } }</script>
    <style>
        body { font-family: 'inter', sans-serif; }
        .hidden-view { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex">
    <aside class="w-72 bg-white border-r flex flex-col sticky top-0 h-screen">
        <div class="p-8 font-black text-3xl text-primary tracking-tighter">seller.</div>
        <div class="px-6 mb-4">
            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <p id="seller-mail" class="text-[10px] font-black text-slate-400 truncate mb-2 uppercase tracking-widest">memuat...</p>
                <button id="btn-logout" class="w-full bg-red-50 text-red-500 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-red-100 transition">keluar</button>
            </div>
        </div>
        <nav class="p-6 space-y-3 font-black text-[10px] uppercase tracking-widest">
            <button onclick="window.switchtab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-4 bg-blue-50 text-primary rounded-[1.5rem] transition">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i> pesanan
            </button>
            <button onclick="window.switchtab('requests')" id="nav-requests" class="w-full flex items-center gap-4 px-5 py-4 hover:bg-slate-50 rounded-[1.5rem] transition text-slate-400">
                <i data-lucide="megaphone" class="w-5 h-5"></i> permintaan buyer
            </button>
        </nav>
    </aside>

    <main class="flex-grow p-12 overflow-y-auto">
        <div id="dashboard-view" class="space-y-8">
            <h2 class="text-3xl font-black tracking-tight">Antrean Pesanan</h2>
            <div id="live-orders-container" class="grid gap-4"></div>
        </div>
        <div id="requests-view" class="hidden-view space-y-8">
            <h2 class="text-3xl font-black tracking-tight">Live Broadcast Buyer</h2>
            <div id="live-requests-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>
    </main>

    <div id="offer-modal" class="hidden-view fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[110] flex items-center justify-center p-6 text-left">
        <div class="bg-white rounded-[3rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-8 border-b flex justify-between items-center bg-white sticky top-0"><h2 class="text-2xl font-black italic tracking-tighter">kasih tawaran harga.</h2><button onclick="window.closeOfferModal()" class="text-slate-300">✕</button></div>
            <form id="form-tawaran" class="p-8 overflow-y-auto custom-scrollbar space-y-5">
                <input type="hidden" id="target-request-id">
                <input type="text" id="o-name" placeholder="nama produk" required class="w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 outline-none font-bold text-sm">
                <div class="grid grid-cols-2 gap-4"><input type="number" id="o-price" placeholder="harga (rp)" required class="w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 outline-none font-bold text-sm"><input type="text" id="o-store" placeholder="nama toko" required class="w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 outline-none font-bold text-sm"></div>
                <div class="grid grid-cols-2 gap-4"><input type="text" id="o-berat" placeholder="berat (ex: 250g)" class="w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 outline-none font-bold text-sm"><input type="text" id="o-volume" placeholder="dimensi (ex: 10x10cm)" class="w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 outline-none font-bold text-sm"></div>
                <div class="p-5 bg-blue-50 rounded-3xl space-y-2 border border-blue-100"><label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest">1. Foto Produk Penawaran</label><input type="file" id="o-media" accept="image/*" required class="w-full text-xs font-bold text-slate-500 cursor-pointer"></div>
                <div class="p-5 bg-orange-50 rounded-3xl space-y-2 border border-orange-100"><label class="block text-[10px] font-black text-orange-600 uppercase tracking-widest">2. Foto QR Pembayaran Toko</label><input type="file" id="o-qr" accept="image/*" required class="w-full text-xs font-bold text-slate-500 cursor-pointer"></div>
                <div class="grid grid-cols-2 gap-4"><input type="text" id="o-bank" placeholder="bca / dana / qris" required class="w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 outline-none font-bold text-sm"><input type="text" id="o-rek" placeholder="no rekening / hp" required class="w-full bg-slate-50 border-0 rounded-2xl px-6 py-4 outline-none font-bold text-sm"></div>
                <button type="submit" id="btn-kirim-tawaran" class="w-full bg-primary text-white py-5 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl">kirim penawaran</button>
            </form>
        </div>
    </div>

    <div id="chat-modal-seller" class="hidden-view fixed bottom-6 right-6 z-[120] w-80 h-[450px] bg-white rounded-[2.5rem] shadow-2xl border flex flex-col overflow-hidden text-left">
        <div class="p-4 bg-primary text-white flex justify-between items-center"><span class="font-black italic text-sm text-left" id="chat-seller-title">chat</span><button onclick="window.closeChatSeller()">✕</button></div>
        <div id="chat-box-seller" class="flex-grow p-4 overflow-y-auto space-y-3 bg-slate-50 flex flex-col text-[11px] custom-scrollbar"></div>
        <form onsubmit="event.preventDefault(); window.sendChatSeller();" class="p-3 bg-white border-t flex items-center gap-2">
            <label class="cursor-pointer text-slate-400 hover:text-primary"><i data-lucide="image" class="w-5 h-5"></i><input type="file" id="chat-img-seller" accept="image/*" class="hidden"></label>
            <input type="text" id="chat-input-seller" placeholder="balas..." class="flex-grow bg-slate-100 rounded-xl px-4 py-2 text-xs outline-none"><button type="submit" class="bg-primary text-white p-2 rounded-xl">kirim</button>
        </form>
    </div>

    <div id="login-view" class="fixed inset-0 bg-[#111827] z-[200] flex items-center justify-center p-6 text-center"><div class="bg-white p-10 rounded-[3.5rem] w-full max-w-sm shadow-2xl"><h2 class="text-3xl font-black mb-6">login seller.</h2><form onsubmit="event.preventDefault(); window.handleAuth();" class="space-y-4"><input type="email" id="email-input" placeholder="EMAIL" required class="w-full bg-slate-50 rounded-2xl px-6 py-4 outline-none font-bold text-xs"><input type="password" id="password-input" placeholder="PASSWORD" required class="w-full bg-slate-50 rounded-2xl px-6 py-4 outline-none font-bold text-xs"><button type="submit" class="w-full bg-primary text-white py-5 rounded-2xl font-black uppercase text-[10px]">Masuk</button></form></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, getDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAdPxvp6zhIEjNPdQJq-4F7eU0bwTaGrMs", authDomain: "simplein-55eeb.firebaseapp.com", projectId: "simplein-55eeb", storageBucket: "simplein-55eeb.firebasestorage.app", messagingSenderId: "513993838187", appId: "1:513993838187:web:281d8a37bc75fab7572b2e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentChatId = null;

        window.switchtab = (tab) => {
            ['dashboard', 'requests'].forEach(t => { document.getElementById(t + '-view').classList.add('hidden-view'); document.getElementById('nav-' + t).classList.remove('bg-blue-50', 'text-primary'); document.getElementById('nav-' + t).classList.add('text-slate-400'); });
            document.getElementById(tab + '-view').classList.remove('hidden-view'); document.getElementById('nav-' + tab).classList.add('bg-blue-50', 'text-primary'); document.getElementById('nav-' + tab).classList.remove('text-slate-400');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        onAuthStateChanged(auth, (user) => { if (user) { document.getElementById('login-view').classList.add('hidden-view'); document.getElementById('seller-mail').innerText = user.email; mulaiPantau(user.email); } else { document.getElementById('login-view').classList.remove('hidden-view'); } });
        window.handleAuth = () => signInWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value);
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        function mulaiPantau(email) {
            onSnapshot(query(collection(db, "transactions"), where("sellerId", "==", email)), (snap) => {
                const cont = document.getElementById('live-orders-container'); cont.innerHTML = '';
                snap.forEach(d => {
                    const t = d.data(); const id = d.id;
                    cont.innerHTML += `
                        <div class="p-6 bg-white border border-slate-100 rounded-[2rem] flex flex-col gap-4 text-left">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-primary"><i data-lucide="package"></i></div>
                                    <div><h4 class="font-black text-sm text-slate-800">${t.item}</h4><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${t.customer}</p></div>
                                </div>
                                <div class="text-right">
                                    <p class="text-orange-500 font-black text-lg leading-none">Rp ${Number(t.price).toLocaleString()}</p>
                                    <span class="text-[8px] font-black uppercase ${t.status === 'berhasil' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'} px-2 py-0.5 rounded">${t.status}</span>
                                </div>
                            </div>
                            <div class="flex gap-2 pt-4 border-t">
                                <button onclick="window.lihatBukti('${t.bukti}')" class="flex-grow bg-slate-100 text-slate-600 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-tighter">Bukti TF</button>
                                <button onclick="window.openChatSeller('${id}', '${t.customer}')" class="p-2.5 bg-blue-50 text-blue-600 rounded-xl"><i data-lucide="message-square"></i></button>
                                
                                <select onchange="window.updateStatusChat('${id}', '${t.customer}', this.value)" class="bg-slate-900 text-white px-3 py-2.5 rounded-xl text-[10px] font-black uppercase outline-none cursor-pointer">
                                    <option value="" disabled selected>STATUS</option>
                                    <option value="OTW">DIANTAR</option>
                                    <option value="DITERIMA">DITERIMA</option>
                                </select>

                                ${t.status !== 'berhasil' ? `<button onclick="window.accPembayaran('${id}')" class="flex-grow bg-primary text-white py-2.5 rounded-xl text-[10px] font-black uppercase">ACC</button>` : `<button disabled class="flex-grow bg-green-500 text-white py-2.5 rounded-xl text-[10px] font-black opacity-50 italic">Selesai</button>`}
                            </div>
                        </div>`;
                });
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });

            onSnapshot(query(collection(db, "requests"), where("status", "==", "open")), (snap) => {
                const cont = document.getElementById('live-requests-container'); cont.innerHTML = '';
                snap.forEach(d => {
                    const r = d.data(); const reqId = d.id; const cardId = 'card-' + reqId;
                    cont.innerHTML += `<div id="${cardId}" class="p-8 bg-white border-2 border-slate-50 rounded-[2.5rem] shadow-sm transition group text-left"><h4 class="text-xl font-black text-slate-800 mb-6 italic leading-tight text-left">"${r.query}"</h4><div id="btn-container-${reqId}"><button onclick="window.openOfferModal('${reqId}')" class="w-full bg-primary text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg hover:bg-black transition">Kasih Harga</button></div></div>`;
                    onSnapshot(query(collection(db, "offers"), where("requestId", "==", reqId), where("sellerId", "==", email)), (checkSnap) => {
                        const btnCont = document.getElementById('btn-container-' + reqId); const card = document.getElementById(cardId);
                        if (!checkSnap.empty && btnCont && card) { card.classList.add('bg-slate-50', 'border-orange-200', 'opacity-80'); btnCont.innerHTML = `<button disabled class="w-full bg-orange-400 text-white py-4 rounded-2xl text-[10px] font-black uppercase cursor-not-allowed">Sudah Ditawar</button>`; }
                    });
                });
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });
        }

        // --- FUNGSI UPDATE STATUS KE CHAT ---
        window.updateStatusChat = async (orderId, customerName, status) => {
            try {
                // Tarik data penawaran terakhir buat ambil foto barang
                const transSnap = await getDoc(doc(db, "transactions", orderId));
                if (!transSnap.exists()) return alert("Gagal narik data transaksi!");
                
                const dataTrans = transSnap.data();
                const fotoBarang = dataTrans.media_url || ""; // Foto produk awal
                
                let pesan = "";
                if (status === "OTW") pesan = `Halo ${customerName}, barang lu lagi diantar kurir ya!`;
                else if (status === "DITERIMA") pesan = `Barang lu katanya udah sampai di lokasi nih. Cek ya!`;

                await addDoc(collection(db, "chats"), {
                    orderId: orderId,
                    sender: 'seller',
                    message: pesan,
                    img: fotoBarang, // Kirim foto barang bareng status
                    time: serverTimestamp()
                });
                alert("Status & Foto berhasil dikirim ke buyer!");
            } catch (e) { alert("Gagal update status!"); }
        };

        window.lihatBukti = (b) => { const img = new Image(); img.src = b; const w = window.open(""); w.document.write(img.outerHTML); };
        window.accPembayaran = async (id) => { if(confirm("ACC?")) { await updateDoc(doc(db, "transactions", id), { status: "berhasil" }); } };
        window.openOfferModal = (id) => { document.getElementById('target-request-id').value = id; document.getElementById('offer-modal').classList.remove('hidden-view'); };
        window.closeOfferModal = () => document.getElementById('offer-modal').classList.add('hidden-view');

        document.getElementById('form-tawaran').onsubmit = async (e) => {
            e.preventDefault(); const btn = document.getElementById('btn-kirim-tawaran'); btn.innerText = "...";
            const toB64 = (f) => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
            try {
                const img = await toB64(document.getElementById('o-media').files[0]); const qr = await toB64(document.getElementById('o-qr').files[0]);
                await addDoc(collection(db, "offers"), { requestId: document.getElementById('target-request-id').value, sellerId: auth.currentUser.email, storeName: document.getElementById('o-store').value, productName: document.getElementById('o-name').value, price: Number(document.getElementById('o-price').value), berat: document.getElementById('o-berat').value || "-", volume: document.getElementById('o-volume').value || "-", media_url: img, qr_url: qr, bank: document.getElementById('o-bank').value, rekening: document.getElementById('o-rek').value, createdAt: serverTimestamp() });
                window.closeOfferModal(); btn.innerText = "KIRIM PENAWARAN";
            } catch (err) { alert("Gagal!"); }
        };

       // Ganti fungsi openChatSeller di seller.html lu pake yang ini
window.openChatSeller = (orderId, customerName) => {
    currentChatId = orderId;
    document.getElementById('chat-seller-title').innerText = "chat: " + customerName;
    document.getElementById('chat-modal-seller').classList.remove('hidden-view');
    
    // Cek status transaksi buat ngunci chat
    onSnapshot(doc(db, "transactions", orderId), (docSnap) => {
        const isSelesai = docSnap.data()?.status === 'selesai';
        const chatForm = document.querySelector('#chat-modal-seller form');
        if (isSelesai) {
            chatForm.innerHTML = `<div class="w-full text-center p-2 text-[10px] font-black uppercase text-slate-400 bg-slate-100 italic">Transaksi Selesai</div>`;
        }
    });

    onSnapshot(query(collection(db, "chats"), where("orderId", "==", orderId)), (snap) => {
        const box = document.getElementById('chat-box-seller'); 
        box.innerHTML = '';
        const msgs = []; snap.forEach(d => msgs.push(d.data()));
        msgs.sort((a,b) => (a.time?.seconds || 0) - (b.time?.seconds || 0));
        msgs.forEach(m => {
            const isMe = m.sender === 'seller';
            const align = isMe ? 'items-end' : 'items-start';
            const bg = isMe ? 'bg-primary text-white rounded-l-xl rounded-tr-xl' : 'bg-white border rounded-r-xl rounded-tl-xl';
            const foto = m.img ? `<img src="${m.img}" class="w-full rounded-lg mb-1 cursor-pointer" onclick="window.open('${m.img}')">` : '';
            box.innerHTML += `<div class="flex flex-col ${align} mb-1"><div class="${bg} p-2 max-w-[80%] shadow-sm">${foto}${m.message || ''}</div></div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
};

        window.sendChatSeller = async () => {
            const input = document.getElementById('chat-input-seller'), fileInput = document.getElementById('chat-img-seller');
            if(!input.value && !fileInput.files[0]) return;
            let img = null; if(fileInput.files[0]) { const toB64 = (f) => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); }); img = await toB64(fileInput.files[0]); }
            await addDoc(collection(db, "chats"), { orderId: currentChatId, sender: 'seller', message: input.value, img: img, time: serverTimestamp() });
            input.value = ''; fileInput.value = '';
        };
        window.closeChatSeller = () => document.getElementById('chat-modal-seller').classList.add('hidden-view');
        window.onload = () => { if (typeof lucide !== 'undefined') lucide.createIcons(); };
    </script>
</body>
</html>
