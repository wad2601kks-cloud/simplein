<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simplein - belanja tanpa ribet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.363.0"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="importmap">{ "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }</script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#1e40af', accent: '#f97316' }, fontFamily: { sans: ['inter', 'sans-serif'] } } } }</script>
    <style>
        .hidden-view { display: none !important; }
        #map { height: 180px; width: 100%; border-radius: 1.5rem; margin-top: 8px; border: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="p-6 sticky top-0 z-40 bg-slate-50/90 backdrop-blur-sm border-b border-slate-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-2xl text-primary tracking-tighter cursor-pointer" onclick="window.showview('home-view')">simplein.</div>
            <div class="flex items-center gap-4">
                <button onclick="window.toggleHistory()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-primary transition flex items-center gap-1">
                    <i data-lucide="history" class="w-3 h-3"></i> history
                </button>
                <a href="seller.html" class="bg-slate-900 text-white px-5 py-2 rounded-full text-[10px] font-bold uppercase hover:bg-black transition tracking-widest">login seller</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-4 max-w-6xl mx-auto w-full">
        <div id="home-view" class="w-full max-w-3xl text-center space-y-6 py-20">
            <h1 class="text-5xl md:text-6xl font-black text-slate-900 leading-tight tracking-tight">apa yang lu butuhin? <br><span class="text-primary italic">biar seller nyari lu.</span></h1>
            <div class="relative mt-10 shadow-2xl rounded-full overflow-hidden border border-slate-200 bg-white max-w-2xl mx-auto">
                <input type="text" id="ai-input" class="block w-full pl-8 pr-32 py-6 border-none text-lg outline-none font-medium" placeholder="misal: monitor 144hz budget 2jt...">
                <button onclick="window.handleaisearch()" class="absolute inset-y-2 right-2 bg-primary text-white px-10 rounded-full font-bold transition hover:bg-blue-800 uppercase text-xs tracking-widest">broadcast</button>
            </div>
        </div>

        <div id="loading-view" class="hidden-view w-full text-center py-32 space-y-4">
            <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">broadcast permintaan lu...</p>
        </div>

        <div id="results-view" class="hidden-view w-full py-8 space-y-8">
            <div class="bg-blue-50 border border-blue-100 p-6 rounded-[2.5rem] flex gap-4 items-center shadow-sm max-w-3xl mx-auto">
                <div class="bg-primary text-white p-3 rounded-2xl"><i data-lucide="bot" class="w-5 h-5"></i></div>
                <div><h3 class="font-black text-primary text-[10px] uppercase tracking-widest">status</h3><p id="ai-response-text" class="text-slate-600 text-sm font-medium"></p></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="product-container"></div>
        </div>
    </main>

    <div id="history-panel" class="hidden-view fixed inset-y-0 right-0 w-80 bg-white shadow-2xl z-[100] flex flex-col border-l">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-black italic text-lg text-primary">riwayat belanja.</h3>
            <button onclick="window.toggleHistory()" class="text-slate-400 hover:text-red-500 transition">✕</button>
        </div>
        <div id="history-list" class="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar"></div>
    </div>

    <div id="chat-modal-buyer" class="hidden-view fixed bottom-24 right-10 z-[100] w-80 h-[450px] bg-white rounded-[2.5rem] shadow-2xl border flex flex-col overflow-hidden">
        <div class="p-4 bg-primary text-white flex justify-between items-center">
            <span class="font-black italic text-sm" id="chat-buyer-title">chat seller</span>
            <button onclick="window.closeChatBuyer()">✕</button>
        </div>
        <div id="chat-box-buyer" class="flex-grow p-4 overflow-y-auto space-y-3 bg-slate-50 flex flex-col text-[11px] custom-scrollbar"></div>
       <form onsubmit="event.preventDefault(); window.sendChatBuyer();" class="p-3 bg-white border-t flex gap-2 items-center">
    <label class="cursor-pointer text-slate-400 hover:text-primary transition">
        <i data-lucide="image" class="w-5 h-5"></i>
        <input type="file" id="chat-img-buyer" accept="image/*" class="hidden">
    </label>
    
    <input type="text" id="chat-input-buyer" placeholder="tulis pesan..." class="flex-grow bg-slate-100 rounded-xl px-4 py-2 text-xs outline-none font-medium">
    <button type="submit" class="bg-primary text-white p-2 rounded-xl shadow-lg hover:bg-black transition">
        <i data-lucide="send" class="w-4 h-4"></i>
    </button>
</form>
    </div>

    <div id="checkout-modal" class="hidden-view fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md overflow-hidden shadow-2xl flex flex-col max-h-[95vh]">
            <div class="p-6 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                <h2 class="text-xl font-black italic">checkout kilat.</h2>
                <button onclick="window.closecheckout()" class="text-slate-300">✕</button>
            </div>
            <div class="p-6 overflow-y-auto space-y-5 custom-scrollbar">
                <div class="flex gap-4 items-center p-4 bg-slate-50 rounded-3xl border">
                    <div id="modal-img-placeholder" class="w-20 h-20 rounded-2xl overflow-hidden bg-white border"></div>
                    <div>
                        <h4 class="font-black text-sm" id="modal-title"></h4>
                        <p class="text-accent font-black text-xl" id="modal-price"></p>
                    </div>
                </div>
                <form class="space-y-4" onsubmit="event.preventDefault(); window.processpayment();">
                    <input type="text" id="buyer-name" placeholder="nama lengkap lu" required class="w-full bg-slate-50 rounded-2xl px-5 py-4 outline-none text-sm font-bold">
                    <div id="map"></div>
                    <textarea id="buyer-address-detail" required class="w-full bg-slate-50 rounded-2xl px-5 py-4 outline-none text-sm h-24" placeholder="alamat lengkap..."></textarea>
                    <div class="p-5 bg-orange-50 rounded-[2rem] flex items-center gap-5 border border-orange-100">
                        <img id="seller-qr" src="" class="w-24 h-24 bg-white p-1 rounded-2xl border object-cover">
                        <div class="text-[10px]">
                            <p class="font-black text-slate-800" id="seller-bank-name"></p>
                            <p class="font-bold text-slate-500">REK: <span id="seller-rekening"></span></p>
                            <p class="text-primary font-black uppercase mt-1" id="modal-store-name"></p>
                        </div>
                    </div>
                    <input type="file" id="pembayaran-image" accept="image/*" required class="w-full text-xs">
                    <button type="submit" id="btn-bayar" class="w-full bg-[#111827] text-white font-black py-5 rounded-[2rem] shadow-xl uppercase tracking-widest text-xs">bayar sekarang</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
