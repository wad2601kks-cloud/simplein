<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simplein - belanja tanpa ribet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.363.0"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1e40af', accent: '#f97316' }, fontFamily: { sans: ['inter', 'sans-serif'] } } } }
    </script>
    <style>
        .hidden-view { display: none !important; }
        #map { height: 200px; width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid #e2e8f0; z-index: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col text-left">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="font-black text-2xl text-primary cursor-pointer tracking-tighter" onclick="window.showview('home-view')">simplein.</div>
            <div class="flex items-center gap-3">
                <button onclick="window.promptLacak()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-primary transition">lacak</button>
                <div class="h-4 w-[1px] bg-slate-200"></div>
                <a href="seller.html" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase hover:bg-slate-200 transition">login seller</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-4 max-w-5xl mx-auto w-full">
        <div id="home-view" class="w-full max-w-2xl text-center space-y-8 py-20">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 leading-tight">cari barang apapun, <br><span class="text-primary italic">biar ai yang kerja.</span></h1>
            <div class="relative mt-8 shadow-2xl rounded-full overflow-hidden border border-slate-100">
                <input type="text" id="ai-input" class="block w-full pl-6 pr-32 py-5 border-none text-lg outline-none" placeholder="misal: razer blackshark v2...">
                <button onclick="window.handleaisearch()" class="absolute inset-y-2 right-2 bg-primary text-white px-8 rounded-full font-bold transition hover:bg-blue-800">cari</button>
            </div>
        </div>

        <div id="loading-view" class="hidden-view w-full text-center py-32 space-y-4">
            <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="text-slate-400 font-bold text-sm uppercase tracking-widest">ai lagi nyari barang...</p>
        </div>

        <div id="results-view" class="hidden-view w-full py-8 space-y-6 text-left">
            <button onclick="window.showview('home-view')" class="text-xs font-bold text-slate-400 flex items-center gap-1 mb-4 uppercase hover:text-primary transition"><i data-lucide="arrow-left" class="w-4 h-4"></i> kembali</button>
            <div class="bg-blue-50 border border-blue-100 p-6 rounded-[2rem] flex gap-4 items-start mb-6 shadow-sm">
                <div class="bg-primary text-white p-2.5 rounded-2xl"><i data-lucide="bot" class="w-5 h-5"></i></div>
                <div><h3 class="font-bold text-primary text-sm uppercase">analisis asisten ai</h3><p class="text-slate-600 text-sm leading-relaxed" id="ai-response-text"></p></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="product-container"></div>
        </div>
    </main>

    <div id="checkout-modal" class="hidden-view fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-center"><h2 class="text-xl font-black italic">checkout kilat.</h2><button onclick="window.closecheckout()" class="text-slate-400 hover:text-red-500 transition">✕</button></div>
            <div class="p-6 overflow-y-auto space-y-5">
                <div class="flex gap-4 items-center p-4 bg-slate-50 rounded-3xl border">
                    <div id="modal-img-placeholder" class="w-16 h-16 rounded-xl overflow-hidden bg-white shadow-sm"></div>
                    <div><h4 class="font-bold text-sm" id="modal-title"></h4><p class="text-accent font-black text-lg" id="modal-price"></p></div>
                </div>
                <form class="space-y-4 text-left" onsubmit="event.preventDefault(); window.processpayment();">
                    <input type="text" id="buyer-name" placeholder="nama lu siapa bos?" required class="w-full border rounded-2xl px-4 py-3 outline-none text-sm focus:border-primary transition">
                    <div id="map"></div><p id="location-status" class="text-[10px] text-blue-600 font-bold italic">klik peta buat set alamat...</p>
                    <input type="hidden" id="buyer-lat"><input type="hidden" id="buyer-lng">
                    <textarea id="buyer-address-detail" required class="w-full border rounded-2xl px-4 py-3 outline-none text-sm focus:border-primary transition" placeholder="patokan alamat lengkap..."></textarea>
                    <div class="p-4 bg-orange-50 rounded-[2rem] flex items-center gap-4 border border-orange-100">
                        <img id="seller-qr" src="" class="w-20 h-20 bg-white p-1 rounded-2xl border">
                        <div class="text-[9px] uppercase font-bold text-slate-500">transfer ke:<br><span class="text-slate-800 text-xs font-black" id="seller-bank-name"></span><br>rek: <span class="text-slate-800 text-xs font-black" id="seller-rekening"></span></div>
                    </div>
                    <input type="file" id="pembayaran-image" accept="image/*" required class="text-[10px] w-full border-2 border-dashed p-3 rounded-2xl">
                    <button type="submit" id="btn-bayar" class="w-full bg-[#111827] text-white font-black py-4 rounded-[2rem] shadow-xl hover:bg-black transition uppercase tracking-widest text-xs">bayar sekarang</button>
                </form>
            </div>
        </div>
    </div>

    <div class="fixed bottom-24 right-6 z-50">
        <button onclick="window.toggleAI()" class="bg-gradient-to-tr from-purple-600 to-blue-500 text-white p-5 rounded-[2rem] shadow-2xl hover:scale-110 transition"><i data-lucide="bot" class="w-6 h-6"></i></button>
    </div>

    <div id="ai-chat-modal" class="hidden-view fixed bottom-32 right-6 z-[100] w-80 h-[450px] bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden text-left">
        <div class="p-4 bg-gradient-to-r from-purple-600 to-blue-500 text-white flex justify-between items-center shadow-lg"><span class="font-black italic text-sm tracking-tight">simplein ai.</span><button onclick="window.toggleAI()">✕</button></div>
        <div id="ai-chat-box" class="flex-grow p-4 overflow-y-auto space-y-3 bg-slate-50/50 flex flex-col text-[11px]">
            <div class="bg-white border p-3 rounded-2xl self-start max-w-[85%] shadow-sm text-slate-600 leading-relaxed">halo bos! gua asisten simplein. tanya stok, saran produk, atau paket lu nyampe mana gaskeun!</div>
        </div>
        <div id="ai-typing" class="hidden px-4 py-2 text-[10px] text-purple-400 font-bold animate-pulse">ai lagi mikir...</div>
        <form onsubmit="event.preventDefault(); window.askAI();" class="p-3 bg-white border-t flex gap-2">
            <input type="text" id="ai-query" placeholder="tanya apa aja..." class="flex-grow border-none bg-slate-100 rounded-xl px-4 py-2 text-xs outline-none">
            <button type="submit" class="bg-purple-600 text-white p-2 rounded-xl shadow-lg"><i data-lucide="sparkles" class="w-4 h-4"></i></button>
        </form>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
